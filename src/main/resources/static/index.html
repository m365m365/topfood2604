<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Food Now</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .page-title {
            font-weight: 700;
        }

        .section-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
        }

        .card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-img-top {
            height: 180px;
            object-fit: cover;
        }

        .card-title {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 1rem;
            font-weight: 700;
        }

        .card-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 38px;
        }

        .top-actions {
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="d-flex justify-content-between align-items-center mb-4 top-actions flex-wrap">
    <h2 class="page-title mb-0">Top Food Now</h2>

    <div class="d-flex gap-2">

        <a href="/test.html" class="btn btn-outline-dark">
            developer
        </a>

        <a href="/login.html" class="btn btn-outline-success">
            登入
        </a>

        <button type="button" class="btn btn-primary" id="aiSearchButton">
            AI 搜尋
        </button>

    </div>
</div>

    <div class="card shadow-sm section-card">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">AI 推薦餐廳</h5>
            <span class="text-muted small">REST API 假資料示範</span>
        </div>
        <div class="card-body">
            <div class="row g-3" id="ai-container">
                <div class="col-12 text-center text-muted py-4">
                    請按「AI 搜尋」載入餐廳資料
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const aiSearchButton = document.getElementById("aiSearchButton");
    const container = document.getElementById("ai-container");

    aiSearchButton.addEventListener("click", function () {
        loadAiRestaurants();
    });

    function loadAiRestaurants() {
        container.innerHTML = `
            <div class="col-12 text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 mb-0">AI 推薦載入中...</p>
            </div>
        `;

        fetch("/api/restaurants/recommendations/ai")
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP status = " + response.status);
                }
                return response.json();
            })
            .then(data => {
                renderCards(data);
            })
            .catch(error => {
                console.error("載入 API 失敗:", error);
                container.innerHTML = `
                    <div class="col-12 text-center text-danger py-4">
                        載入推薦時發生錯誤，請稍後再試。
                    </div>
                `;
            });
    }

    function renderCards(data) {
        if (!data || data.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center text-muted py-4">
                    目前沒有資料
                </div>
            `;
            return;
        }

        container.innerHTML = "";

        data.forEach(item => {
            const name = item.name || "未命名餐廳";
            const url = item.url || "#";
            const photoUrl = item.photoUrl || "https://via.placeholder.com/600x400?text=No+Image";
            const address = item.address || "尚無地址資料";

            const cardHtml = `
                <div class="col-12 col-sm-6 col-lg-4">
                    <div class="card shadow-sm h-100">
                        <a href="${url}" target="_blank">
                            <img src="${photoUrl}" class="card-img-top" alt="${escapeHtml(name)}"
                                 onerror="this.onerror=null;this.src='https://via.placeholder.com/600x400?text=No+Image';">
                        </a>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${escapeHtml(name)}</h5>
                            <p class="card-text text-muted small">${escapeHtml(address)}</p>
                            <div class="mt-auto">
                                <a href="${url}" target="_blank" class="btn btn-outline-primary btn-sm">
                                    查看餐廳
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML("beforeend", cardHtml);
        });
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
