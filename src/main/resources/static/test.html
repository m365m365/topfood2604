<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 搜尋測試頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f6f8;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
            background: #fafafa;
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .card a {
            color: #007bff;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>AI 搜尋測試頁</h1>

    <button onclick="searchAiRestaurants()">AI 搜尋</button>

    <div id="message" class="message"></div>
    <div id="result"></div>
</div>

<script>
    async function searchAiRestaurants() {
        clearMessage();
        document.getElementById("result").innerHTML = "";

        try {
            showMessage("AI 搜尋中...", true);

            const response = await fetch('/api/AiRestaurantApi/test', {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error("API 呼叫失敗，狀態碼：" + response.status);
            }

            const data = await response.json();

            if (!Array.isArray(data) || data.length === 0) {
                showMessage("沒有取得資料", false);
                return;
            }

            renderRestaurants(data);
            showMessage("成功取得資料，共 " + data.length + " 筆", true);

        } catch (error) {
            console.error(error);
            showMessage("錯誤：" + error.message, false);
        }
    }

    function renderRestaurants(list) {
        const result = document.getElementById("result");
        result.innerHTML = "";

        list.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h3>${escapeHtml(item.name || "未命名餐廳")}</h3>
                <div>
                    <a href="${item.url || '#'}" target="_blank">${escapeHtml(item.url || "無網址")}</a>
                </div>
            `;

            result.appendChild(div);
        });
    }

    function showMessage(text, success) {
        const msg = document.getElementById("message");
        msg.style.display = "block";
        msg.className = "message " + (success ? "success" : "error");
        msg.textContent = text;
    }

    function clearMessage() {
        const msg = document.getElementById("message");
        msg.style.display = "none";
        msg.textContent = "";
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
