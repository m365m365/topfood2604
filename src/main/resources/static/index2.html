<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Food Now</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #fff7f0, #f5f7fb);
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            padding: 24px;
        }

        .main-shell {
            max-width: 1320px;
            margin: auto;
        }

        .hero {
            background: white;
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .page-title {
            font-weight: 800;
        }

        .hero-subtitle {
            color: #666;
            margin-top: 8px;
        }

        .section-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            background: white;
        }

        .section-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 18px 20px;
        }

        .section-title {
            font-weight: 800;
            margin: 0;
        }

        .section-note {
            font-size: 13px;
            color: #777;
        }

        .ai-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            height: 100%;
            transition: 0.25s;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
        }

        .ai-card:hover,
        .recommend-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 26px rgba(0,0,0,0.15);
        }

        .ai-card img {
            height: 180px;
            object-fit: cover;
            cursor: pointer;
        }

        .ai-card .card-title {
            font-size: 1rem;
            font-weight: 800;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ai-card .card-text {
            font-size: 13px;
            min-height: 40px;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .recommend-card {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 12px;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
            transition: 0.25s;
        }

        .recommend-card img {
            width: 110px;
            height: 125px;
            object-fit: cover;
        }

        .recommend-content {
            padding: 12px 12px 12px 0;
        }

        .recommend-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-address {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-desc {
            font-size: 12px;
            color: #777;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .stars {
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .badge-soft {
            background: #fff1e8;
            color: #ff6b35;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .empty-box {
            color: #777;
            text-align: center;
            padding: 40px 16px;
        }

        .btn-orange {
            background: #ff6b35;
            color: white;
            border: none;
        }

        .btn-orange:hover {
            background: #e85f2f;
            color: white;
        }

        @media (max-width: 991px) {
            body {
                padding: 14px;
            }

            .hero {
                padding: 18px;
            }

            .recommend-card {
                grid-template-columns: 120px 1fr;
            }

            .recommend-card img {
                width: 120px;
            }
        }
    </style>
</head>

<body>

<div class="main-shell">

    <div class="hero">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h2 class="page-title mb-0">Top Food Now</h2>
                <div class="hero-subtitle">
                    AI 推薦餐廳 + 會員真實推薦 + S3 美食照片
                </div>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <a href="/test.html" class="btn btn-outline-dark">developer</a>
                <a href="/login.html" class="btn btn-outline-success">登入</a>
                <a href="/recommend.html" class="btn btn-orange">我要推薦</a>

                <button type="button" class="btn btn-primary" id="aiSearchButton">
                    AI 搜尋
                </button>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- 左邊：AI 推薦餐廳 -->
        <div class="col-lg-8">
            <div class="section-card">
                <div class="section-header d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="section-title">AI 推薦餐廳</h5>
                        <div class="section-note">預設精選 + AI 即時搜尋</div>
                    </div>
                    <span class="badge-soft">AI Search</span>
                </div>

                <div class="card-body p-4">
                    <div class="row g-3" id="ai-container">
                        <div class="col-12 empty-box">
                            預設餐廳載入中...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右邊：會員推薦餐廳 -->
        <div class="col-lg-4">
            <div class="section-card">
                <div class="section-header d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="section-title">會員推薦餐廳</h5>
                        <div class="section-note">會員推薦，不足 6 筆用預設補滿</div>
                    </div>
                    <span class="badge-soft">Top 6</span>
                </div>

                <div class="card-body p-3">
                    <div id="recommendedRestaurantList" class="recommend-grid">
                        <div class="empty-box">
                            會員推薦載入中...
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    const aiSearchButton = document.getElementById("aiSearchButton");
    const aiContainer = document.getElementById("ai-container");

    aiSearchButton.addEventListener("click", function () {
        loadAiRestaurants();
    });

    async function loadDefaultAiRestaurants() {
        try {
            const response = await fetch("/api/default-restaurants/ai");

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            const converted = data.map(item => ({
                name: item.name,
                address: item.address,
                imageUrl: item.imageUrl,
                mapUrl: item.mapUrl,
                url: item.mapUrl
            }));

            renderAiCards(converted);

        } catch (error) {
            console.error("載入預設 AI 餐廳失敗:", error);

            aiContainer.innerHTML = `
                <div class="col-12 text-center text-danger py-5">
                    預設餐廳載入失敗，請確認 /api/default-restaurants/ai 是否正常。
                </div>
            `;
        }
    }

    function loadAiRestaurants() {
        aiContainer.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 mb-0 text-muted">
                    AI 搜尋中：GPT 產生餐廳 → Google 補圖片與地圖...
                </p>
            </div>
        `;

        fetch("/api/AiRestaurantApi/search")
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP status = " + response.status);
                }
                return response.json();
            })
            .then(data => {
                renderAiCards(data);
            })
            .catch(error => {
                console.error("載入 AI API 失敗:", error);

                aiContainer.innerHTML = `
                    <div class="col-12 text-center text-danger py-5">
                        載入 AI 餐廳資料失敗，請確認後端 API 是否正常。
                    </div>
                `;
            });
    }

    function renderAiCards(data) {
        if (!data || data.length === 0) {
            aiContainer.innerHTML = `
                <div class="col-12 empty-box">
                    目前沒有餐廳資料
                </div>
            `;
            return;
        }

        aiContainer.innerHTML = "";

        data.slice(0, 6).forEach(item => {
            const name = item.name || "未命名餐廳";
            const restaurantUrl = item.url || item.mapUrl || "#";
            const imageUrl = item.imageUrl || "https://via.placeholder.com/600x400?text=No+Image";
            const address = item.address || "尚無地址資料";
            const mapUrl = item.mapUrl || buildMapUrl(item.lat, item.lng, name);

            const cardHtml = `
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card ai-card">
                        <a href="${mapUrl}" target="_blank" title="點圖片查看 Google 地圖">
                            <img src="${imageUrl}"
                                 class="card-img-top"
                                 alt="${escapeHtml(name)}"
                                 loading="lazy"
                                 onerror="this.onerror=null;this.src='https://via.placeholder.com/600x400?text=No+Image';">
                        </a>

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${escapeHtml(name)}</h5>

                            <p class="card-text">
                                ${escapeHtml(address)}
                            </p>

                            <div class="mt-auto d-flex gap-2 flex-wrap">
                                <a href="${restaurantUrl}" target="_blank" class="btn btn-outline-primary btn-sm">
                                    查看餐廳
                                </a>

                                <a href="${mapUrl}" target="_blank" class="btn btn-outline-success btn-sm">
                                    查看地圖
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            aiContainer.insertAdjacentHTML("beforeend", cardHtml);
        });
    }

    async function loadRecommendedRestaurants() {
        const box = document.getElementById("recommendedRestaurantList");

        try {
            const recommendedResponse = await fetch("/api/recommended-restaurants/home");

            if (!recommendedResponse.ok) {
                throw new Error("HTTP status = " + recommendedResponse.status);
            }

            let restaurants = await recommendedResponse.json();

            if (!restaurants) {
                restaurants = [];
            }

            if (restaurants.length < 6) {
                const defaultResponse = await fetch("/api/default-restaurants/member");

                if (defaultResponse.ok) {
                    const defaults = await defaultResponse.json();

                    const convertedDefaults = defaults.map(d => ({
                        restaurantName: d.name,
                        address: d.address,
                        imageUrl: d.imageUrl,
                        thumbUrl: d.imageUrl,
                        description: d.description,
                        starRating: 5,
                        mapUrl: d.mapUrl
                    }));

                    restaurants = restaurants.concat(convertedDefaults).slice(0, 6);
                }
            } else {
                restaurants = restaurants.slice(0, 6);
            }

            if (restaurants.length === 0) {
                box.innerHTML = `
                    <div class="empty-box">
                        目前尚無會員推薦餐廳
                    </div>
                `;
                return;
            }

            box.innerHTML = "";

            restaurants.forEach(r => {
                const name = r.restaurantName || "未命名餐廳";
                const image = r.thumbUrl || r.imageUrl || "https://via.placeholder.com/400x300?text=No+Image";
                const address = r.address || "尚無地址";
                const description = r.description || "";
                const starRating = Number(r.starRating || 5);
                const mapUrl = r.mapUrl || buildMapUrl(null, null, name + " " + address);

                const card = document.createElement("div");
                card.className = "recommend-card";

                card.innerHTML = `
                    <a href="${mapUrl}" target="_blank">
                        <img src="${image}"
                             alt="${escapeHtml(name)}"
                             loading="lazy"
                             onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image';">
                    </a>

                    <div class="recommend-content">
                        <div class="recommend-title">${escapeHtml(name)}</div>
                        <div class="stars">${renderStars(starRating)}</div>
                        <div class="recommend-address">${escapeHtml(address)}</div>
                        <div class="recommend-desc">${escapeHtml(description)}</div>
                        <a href="${mapUrl}" target="_blank" class="btn btn-outline-success btn-sm">
                            地圖
                        </a>
                    </div>
                `;

                box.appendChild(card);
            });

        } catch (error) {
            console.error("載入會員推薦失敗:", error);

            box.innerHTML = `
                <div class="empty-box text-danger">
                    會員推薦載入失敗，請確認 /api/recommended-restaurants/home 是否正常。
                </div>
            `;
        }
    }

    function renderStars(count) {
        const full = Math.max(0, Math.min(5, count));
        return "★".repeat(full) + "☆".repeat(5 - full);
    }

    function buildMapUrl(lat, lng, name) {
        if (lat && lng) {
            return `https://www.google.com/maps?q=${lat},${lng}`;
        }

        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    loadDefaultAiRestaurants();
    loadRecommendedRestaurants();
</script>

</body>
</html>
