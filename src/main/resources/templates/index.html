<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/navbar.css}">
    <title>Top Food Now</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .ai-progress-wrap {
            max-width: 620px;
            margin: 24px auto 0;
        }

        .ai-progress-bar-bg {
            height: 10px;
            background: #e9ecef;
            border-radius: 999px;
            overflow: hidden;
        }

        .ai-progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #0d6efd;
            border-radius: 999px;
            transition: width 0.3s linear;
        }

        .ai-progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }
        body {
            background: linear-gradient(135deg, #fff7f0, #f5f7fb);
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            padding: 24px;
        }

        .page-title {
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .main-shell {
            max-width: 1320px;
            margin: auto;
        }

        .hero {
            background: white;
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .hero-subtitle {
            color: #666;
            margin-top: 8px;
        }

        .top-actions {
            gap: 10px;
        }

        .login-greeting {
            font-weight: 800;
            color: #0d6efd;
            padding: 6px 10px;
            background: #eef5ff;
            border-radius: 999px;
        }

        .section-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            background: white;
        }

        .section-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 18px 20px;
        }

        .section-title {
            font-weight: 800;
            margin: 0;
        }

        .section-note {
            font-size: 13px;
            color: #777;
        }

        .ai-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            height: 100%;
            transition: 0.25s;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
        }

        .ai-card:hover,
        .recommend-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 26px rgba(0,0,0,0.15);
        }

        .ai-card img {
            height: 180px;
            object-fit: cover;
            cursor: pointer;
        }

        .ai-card .card-title {
            font-size: 1rem;
            font-weight: 800;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ai-card .card-text {
            font-size: 13px;
            min-height: 40px;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .recommend-card {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 12px;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
            transition: 0.25s;
        }

        .recommend-card img {
            width: 110px;
            height: 125px;
            object-fit: cover;
        }

        .recommend-content {
            padding: 12px 12px 12px 0;
        }

        .recommend-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-address {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-desc {
            font-size: 12px;
            color: #777;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .stars {
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .badge-soft {
            background: #fff1e8;
            color: #ff6b35;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .empty-box {
            color: #777;
            text-align: center;
            padding: 40px 16px;
        }

        .btn-orange {
            background: #ff6b35;
            color: white;
            border: none;
        }

        .btn-orange:hover {
            background: #e85f2f;
            color: white;
        }

        .member-ranking-card {
            margin-top: 24px;
        }

        .ranking-options {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .ranking-options label {
            font-weight: 700;
            cursor: pointer;
            color: #444;
        }

        .ranking-table {
            width: 100%;
            overflow-x: auto;
        }

        .ranking-header-row,
        .ranking-row {
            display: grid;
            grid-template-columns: 70px 1.2fr 1fr 1fr 1.4fr 110px;
            align-items: center;
            padding: 14px 12px;
            border-bottom: 1px solid #eee;
            min-width: 720px;
        }

        .ranking-header-row {
            background: #fff1e8;
            border-radius: 12px;
            font-weight: 800;
            color: #333;
        }

        .ranking-row:hover {
            background: #fffaf6;
        }

        .rank-number {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ff6b35;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
        }

        .member-link {
            color: #ff6b35;
            font-weight: 800;
            text-decoration: none;
        }

        .member-link:hover {
            text-decoration: underline;
        }

        .like-count {
            color: #ff4d4f;
            font-weight: 800;
        }

        .ranking-pagination {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ranking-pagination button {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            background: #eee;
            cursor: pointer;
            font-weight: 700;
        }

        .ranking-pagination .active-page {
            background: #ff6b35;
            color: white;
        }

        .ranking-pagination button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        @media (max-width: 991px) {
            body {
                padding: 14px;
            }

            .hero {
                padding: 18px;
            }

            .recommend-card {
                grid-template-columns: 120px 1fr;
            }

            .recommend-card img {
                width: 120px;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/main-navbar :: mainNavbar}"></div>

<div class="main-shell">

    <div class="hero">
        <div class="d-flex justify-content-between align-items-center flex-wrap top-actions">
            <div>
                <h2 class="page-title mb-0">Top Food Now</h2>
                <div class="hero-subtitle">
                    首頁先載入舊資料，按 AI 搜尋後才更新最新餐廳
                </div>
            </div>

            <div class="d-flex align-items-center gap-2 flex-wrap mt-3 mt-md-0">

                <div th:if="${loggedIn}" class="login-greeting">
                    Hi, <span th:text="${loginDisplayName}">會員</span>
                </div>

                <a th:if="${!loggedIn}" th:href="@{/login}" class="btn btn-outline-success">
                    登入
                </a>

                <a th:if="${!loggedIn}" th:href="@{/register}" class="btn btn-outline-dark">
                    註冊
                </a>

                <a th:if="${loggedIn}" th:href="@{/logout}" class="btn btn-outline-danger">
                    登出
                </a>

                <button id="recommendButton" class="btn btn-orange">
                    我要推薦
                </button>

                <button type="button" class="btn btn-primary" id="aiSearchButton">
                    AI 搜尋
                </button>


                <button type="button" class="btn btn-success fw-bold" id="memberRankingButton">
                    🏆 會員排行榜
                </button>

            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-lg-8">

            <div class="section-card">
                <div class="section-header d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="section-title">AI 推薦餐廳</h5>
                        <div class="section-note">首頁先讀 MySQL 舊資料，按 AI 才更新</div>
                    </div>
                    <span class="badge-soft">AI Search</span>
                </div>

                <div class="card-body p-4">
                    <div class="row g-3" id="ai-container">
                        <div class="col-12 empty-box">
                            餐廳資料載入中...
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-card member-ranking-card" id="memberRankingBox">
                <div class="section-header d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="section-title">🏆 會員排行榜</h5>
                        <div class="section-note">點會員名稱，可開新分頁查看該會員全部推薦餐廳</div>
                    </div>
                    <span class="badge-soft">Member Rank</span>
                </div>

                <div class="card-body p-4">

                    <div class="ranking-options">
                        <label>
                            <input type="radio" name="rankingType" value="recommend" checked>
                            推薦總數
                        </label>

                        <label>
                            <input type="radio" name="rankingType" value="like">
                            按讚總數
                        </label>

                        <label>
                            <input type="radio" name="rankingType" value="recent">
                            最近推薦
                        </label>
                    </div>

                    <div class="ranking-table">

                        <div class="ranking-header-row">
                            <div>名次</div>
                            <div>會員</div>
                            <div>推薦總數</div>
                            <div>總按讚</div>
                            <div>最近推薦</div>
                            <div>時間</div>
                        </div>

                        <div id="memberRankingList"></div>

                    </div>

                    <div id="rankingPagination" class="ranking-pagination"></div>

                </div>
            </div>

        </div>

        <div class="col-lg-4">

            <div class="section-card">
                <div class="section-header d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="section-title">會員推薦餐廳</h5>
                        <div class="section-note">來自會員上傳的真實美食照片</div>
                    </div>
                    <span class="badge-soft">Top 6</span>
                </div>

                <div class="card-body p-3">
                    <div id="recommendedRestaurantList" class="recommend-grid">
                        <div class="empty-box">
                            會員推薦載入中...
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

<script>
    const aiSearchButton = document.getElementById("aiSearchButton");
    const aiContainer = document.getElementById("ai-container");
    const recommendedBox = document.getElementById("recommendedRestaurantList");
    const recommendButton = document.getElementById("recommendButton");

    const memberRankingButton = document.getElementById("memberRankingButton");
    const memberRankingBox = document.getElementById("memberRankingBox");
    const memberRankingList = document.getElementById("memberRankingList");
    const rankingPagination = document.getElementById("rankingPagination");

    const AI_LOCAL_STORAGE_KEY = "aiRestaurants";

    let memberRankingData = [];
    let currentRankingType = "recommend";
    let currentRankingPage = 1;
    const rankingPageSize = 5;

    recommendButton.addEventListener("click", async function () {
        try {
            const response = await fetch("/api/member/check-login");

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            if (data.loggedIn) {
                window.location.href = "/recommend";
            } else {
                alert("請先會員登入");
                window.location.href = "/login";
            }

        } catch (e) {
            console.error("登入檢查失敗:", e);
            alert("請先會員登入");
            window.location.href = "/login";
        }
    });

    aiSearchButton.addEventListener("click", function () {
        loadAiRestaurants();
    });

    memberRankingButton.addEventListener("click", function () {
        memberRankingBox.scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    });

    document.querySelectorAll("input[name='rankingType']").forEach(radio => {
        radio.addEventListener("change", function () {
            currentRankingType = this.value;
            currentRankingPage = 1;
            loadMemberRanking();
        });
    });

    document.addEventListener("DOMContentLoaded", function () {

        const savedAiRestaurants = localStorage.getItem(AI_LOCAL_STORAGE_KEY);

        if (savedAiRestaurants) {
            try {
                const aiRestaurants = JSON.parse(savedAiRestaurants);
                renderAiCards(aiRestaurants);
                loadRecommendedRestaurantsOnly();
            } catch (e) {
                console.error("localStorage AI 資料解析失敗:", e);
                localStorage.removeItem(AI_LOCAL_STORAGE_KEY);
                loadHomepage();
            }
        } else {
            loadHomepage();
        }

        loadMemberRanking();
    });

    async function loadHomepage() {
        aiContainer.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 text-muted">載入 AI 舊資料中...</p>
            </div>
        `;

        recommendedBox.innerHTML = `
            <div class="empty-box">
                會員推薦載入中...
            </div>
        `;

        try {
            const response = await fetch("/api/homepage");

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            renderAiCards(data.aiRestaurants || []);
            renderRecommendedCards(data.recommendedRestaurants || data.userRecommend || []);

        } catch (error) {
            console.error("首頁資料載入失敗:", error);

            aiContainer.innerHTML = `
                <div class="col-12 text-center text-danger py-5">
                    首頁 AI 舊資料載入失敗，請確認 /api/homepage 是否正常。<br>
                    ${escapeHtml(error.message)}
                </div>
            `;

            recommendedBox.innerHTML = `
                <div class="empty-box text-danger">
                    會員推薦載入失敗，請確認 /api/homepage 是否正常。<br>
                    ${escapeHtml(error.message)}
                </div>
            `;
        }
    }

    async function loadRecommendedRestaurantsOnly() {
        recommendedBox.innerHTML = `
            <div class="empty-box">
                會員推薦載入中...
            </div>
        `;

        try {
            const response = await fetch("/api/homepage");

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            renderRecommendedCards(data.recommendedRestaurants || data.userRecommend || []);

        } catch (error) {
            console.error("會員推薦載入失敗:", error);

            recommendedBox.innerHTML = `
                <div class="empty-box text-danger">
                    會員推薦載入失敗，請確認 /api/homepage 是否正常。<br>
                    ${escapeHtml(error.message)}
                </div>
            `;
        }
    }

    async function loadAiRestaurants() {

        let fakeProgress = 0;
        let fakeSeconds = 0;
        let progressTimer = null;

        aiContainer.innerHTML = `
        <div class="col-12 text-center py-5">
            <h5 class="fw-bold mb-2">✨ AI 搜尋中，請稍候...</h5>
            <p class="text-muted mb-3">正在為您尋找最適合的美食推薦</p>

            <div class="ai-progress-wrap">
                <div class="ai-progress-bar-bg">
                    <div id="aiProgressFill" class="ai-progress-bar-fill"></div>
                </div>

                <div class="ai-progress-info">
                    <span id="aiProgressSecond">0 秒</span>
                    <span>30 秒</span>
                </div>
            </div>

            <p class="mt-3 mb-0 text-muted">
                AI 搜尋中：GPT 產生餐廳 → Google 補圖片與地圖...
            </p>
        </div>
    `;

        const progressFill = document.getElementById("aiProgressFill");
        const progressSecond = document.getElementById("aiProgressSecond");

        progressTimer = setInterval(function () {
            fakeSeconds++;

            if (fakeSeconds <= 30) {
                fakeProgress = Math.min((fakeSeconds / 30) * 100, 95);
                progressFill.style.width = fakeProgress + "%";
                progressSecond.textContent = fakeSeconds + " 秒";
            }

        }, 1000);

        try {
            aiSearchButton.disabled = true;
            aiSearchButton.textContent = "AI 搜尋中...";

            const response = await fetch("/api/restaurants/ai/search");

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            clearInterval(progressTimer);
            progressFill.style.width = "100%";
            progressSecond.textContent = "完成";

            await new Promise(resolve => setTimeout(resolve, 400));

            localStorage.setItem(AI_LOCAL_STORAGE_KEY, JSON.stringify(data));

            renderAiCards(data);

        } catch (error) {
            clearInterval(progressTimer);

            console.error("AI 搜尋失敗:", error);

            aiContainer.innerHTML = `
            <div class="col-12 text-center text-danger py-5">
                AI 搜尋失敗，請確認 /api/restaurants/ai/search 是否正常。<br>
                ${escapeHtml(error.message)}
            </div>
        `;

        } finally {
            aiSearchButton.disabled = false;
            aiSearchButton.textContent = "AI 搜尋";
        }
    }

    function renderAiCards(data) {
        if (!data || data.length === 0) {
            aiContainer.innerHTML = `
                <div class="col-12 empty-box">
                    目前沒有 AI 餐廳資料
                </div>
            `;
            return;
        }

        aiContainer.innerHTML = "";

        data.slice(0, 6).forEach(item => {
            const name = item.name || "未命名餐廳";
            const restaurantUrl = item.url || "#";

            const imageUrl =
                item.imageUrl ||
                item.photoUrl ||
                item.thumbUrl ||
                "https://via.placeholder.com/600x400?text=No+Image";

            const address = item.address || "尚無地址資料";

            const detailUrl =
                "/restaurant-ai-detail.html?name=" +
                encodeURIComponent(name) +
                "&address=" +
                encodeURIComponent(address) +
                "&imageUrl=" +
                encodeURIComponent(imageUrl);

            const mapUrl =
                item.mapUrl ||
                buildMapUrl(item.lat, item.lng, name + " " + address);

            const cardHtml = `
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card ai-card">

                        <img src="${imageUrl}"
                             class="card-img-top"
                             alt="${escapeHtml(name)}"
                             loading="lazy"
                             onerror="this.onerror=null;this.src='https://via.placeholder.com/600x400?text=No+Image';">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${escapeHtml(name)}</h5>

                            <p class="card-text">
                                ${escapeHtml(address)}
                            </p>

                            <div class="mt-auto d-flex gap-2 flex-wrap">
                                <a href="${detailUrl}" target="_blank" class="btn btn-outline-primary btn-sm">
                                    查看餐廳
                                </a>

                                <a href="${mapUrl}" target="_blank" class="btn btn-outline-success btn-sm">
                                    查看地圖
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            aiContainer.insertAdjacentHTML("beforeend", cardHtml);
        });
    }

    function renderRecommendedCards(restaurants) {
        if (!restaurants || restaurants.length === 0) {
            recommendedBox.innerHTML = `
                <div class="empty-box">
                    目前尚無會員推薦餐廳
                </div>
            `;
            return;
        }

        recommendedBox.innerHTML = "";

        restaurants.slice(0, 6).forEach(r => {
            const name = r.restaurantName || r.name || "未命名餐廳";

            const image =
                r.thumbUrl ||
                r.imageUrl ||
                r.photoUrl ||
                "https://via.placeholder.com/400x300?text=No+Image";

            const address = r.address || "尚無地址";
            const description = r.description || "";
            const starRating = Number(r.starRating || r.rating || 0);

            const card = document.createElement("div");
            card.className = "recommend-card";

            card.innerHTML = `
                <a href="/restaurant/${r.id}">
                    <img src="${image}"
                         alt="${escapeHtml(name)}"
                         loading="lazy"
                         onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image';">
                </a>

                <div class="recommend-content">
                    <div class="recommend-title">${escapeHtml(name)}</div>
                    <div class="stars">${renderStars(starRating)}</div>
                    <div class="recommend-address">${escapeHtml(address)}</div>
                    <div class="recommend-desc">${escapeHtml(description)}</div>

                    <button class="btn btn-outline-success btn-sm"
                            onclick="openCorrectMap(${r.id})">
                        地圖
                    </button>
                </div>
            `;

            recommendedBox.appendChild(card);
        });
    }

    async function loadMemberRanking() {
        memberRankingList.innerHTML = `
            <div class="empty-box">會員排行榜載入中...</div>
        `;

        try {
            const response = await fetch(
                `/api/member-ranking?type=${currentRankingType}&page=${currentRankingPage}&size=${rankingPageSize}`
            );

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            memberRankingData = data.content || [];
            renderMemberRanking(memberRankingData, data.totalPages || 1);

        } catch (error) {
            console.error("會員排行榜載入失敗:", error);
            memberRankingList.innerHTML = `
                <div class="empty-box text-danger">
                    會員排行榜載入失敗，請確認 /api/member-ranking 是否正常。<br>
                    ${escapeHtml(error.message)}
                </div>
            `;
            rankingPagination.innerHTML = "";
        }
    }

    function renderMemberRanking(list, totalPages) {
        memberRankingList.innerHTML = "";

        if (!list || list.length === 0) {
            memberRankingList.innerHTML = `
                <div class="empty-box">
                    目前尚無會員排行榜資料
                </div>
            `;
            rankingPagination.innerHTML = "";
            return;
        }

        list.forEach((member, index) => {
            const realRank = (currentRankingPage - 1) * rankingPageSize + index + 1;
            const memberPageUrl = "/member/" + encodeURIComponent(member.memberId) + "/restaurants";

            memberRankingList.innerHTML += `
                <div class="ranking-row">
                    <div>
                        <div class="rank-number">${realRank}</div>
                    </div>

                    <div>
                        <a href="${memberPageUrl}"
                           target="_blank"
                           class="member-link">
                            ${escapeHtml(member.username)}
                        </a>
                    </div>

                    <div>${member.recommendCount || 0} 家</div>

                    <div class="like-count">${member.likeCount || 0} 讚</div>

                    <div>${escapeHtml(member.latestRestaurant || "尚無資料")}</div>

                    <div>${escapeHtml(member.latestTime || "")}</div>
                </div>
            `;
        });

        renderRankingPagination(totalPages);
    }

    function renderRankingPagination(totalPages) {
        rankingPagination.innerHTML = "";

        if (totalPages <= 1) {
            return;
        }

        rankingPagination.innerHTML += `
            <button onclick="changeRankingPage(${currentRankingPage - 1})"
                    ${currentRankingPage === 1 ? "disabled" : ""}>
                上一頁
            </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
            rankingPagination.innerHTML += `
                <button onclick="changeRankingPage(${i})"
                        class="${currentRankingPage === i ? "active-page" : ""}">
                    ${i}
                </button>
            `;
        }

        rankingPagination.innerHTML += `
            <button onclick="changeRankingPage(${currentRankingPage + 1})"
                    ${currentRankingPage === totalPages ? "disabled" : ""}>
                下一頁
            </button>
        `;
    }

    function changeRankingPage(page) {
        if (page < 1) {
            return;
        }

        currentRankingPage = page;
        loadMemberRanking();
    }

    function renderStars(count) {
        const full = Math.max(0, Math.min(5, Math.round(count)));
        return "★".repeat(full) + "☆".repeat(5 - full);
    }

    function buildMapUrl(lat, lng, name) {
        if (lat && lng) {
            return `https://www.google.com/maps?q=${lat},${lng}`;
        }

        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;
    }

    function escapeHtml(text) {
        return String(text || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function openCorrectMap(id) {
        fetch(`/api/recommended-restaurants/${id}/map`)
            .then(response => response.json())
            .then(data => {
                if (data.mapUrl) {
                    window.open(data.mapUrl, "_blank");
                } else {
                    alert("找不到正確地圖");
                }
            })
            .catch(error => {
                console.error(error);
                alert("地圖查詢失敗");
            });
    }
</script>

</body>
</html>
