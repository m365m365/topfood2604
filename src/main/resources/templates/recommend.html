<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <!-- 導覽列 -->
  <link rel="stylesheet" href="/navbar.css">

  <title>會員推薦餐廳</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f6fa;
      padding: 40px;
    }

    .container {
      max-width: 560px;
      margin-top: 100px;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);

    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      height: 120px;
    }

    button {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    .preview {
      margin-top: 16px;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
    }

    .message {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>
<!-- 導覽列 -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div id="navbar-container"></div>
<div class="container">
  <h1>會員推薦餐廳</h1>

  <form id="recommendForm">

    <label>餐廳名稱</label>
    <input type="text" id="restaurantName" required>

    <label>餐廳地址</label>
    <input type="text" id="address" required>

    <label>上傳美食菜色照片</label>
    <input type="file" id="photo" accept="image/*" required>
    <img id="previewImage" class="preview">

    <label>星等評分</label>
    <select id="starRating" required>
      <option value="">請選擇星等</option>
      <option value="5">★★★★★ 5 星</option>
      <option value="4">★★★★ 4 星</option>
      <option value="3">★★★ 3 星</option>
      <option value="2">★★ 2 星</option>
      <option value="1">★ 1 星</option>
    </select>

    <label>推薦描述</label>
    <textarea id="description" required></textarea>

    <button type="submit">送出推薦</button>

    <div id="message" class="message"></div>
  </form>
</div>

<script>
  const photoInput = document.getElementById("photo");
  const previewImage = document.getElementById("previewImage");
  const form = document.getElementById("recommendForm");
  const message = document.getElementById("message");

  // 圖片預覽
  photoInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {

      previewImage.src = URL.createObjectURL(file);

      previewImage.style.display = "block";
    }
  });

  // 表單送出
  form.addEventListener("submit", async function (e) {

    e.preventDefault();

    // 檢查是否有選圖片
    const photoFile =
            document.getElementById("photo").files[0];

    if (!photoFile) {

      message.style.color = "red";

      message.textContent = "請選擇圖片";

      return;
    }

    // 建立 FormData
    const formData = new FormData();

    formData.append(
            "name",
            document.getElementById("restaurantName").value
    );

    formData.append(
            "address",
            document.getElementById("address").value
    );

    formData.append(
            "rating",
            document.getElementById("starRating").value
    );

    formData.append(
            "description",
            document.getElementById("description").value
    );

    formData.append(
            "photo",
            photoFile
    );

    // UI 提示
    message.style.color = "#333";

    message.textContent = "上傳中，請稍候...";

    try {

      // 呼叫後端 API
      const response = await fetch(
              "/api/recommended-restaurants",
              {
                method: "POST",
                body: formData
              }
      );

      // 讀取 JSON
      const result = await response.json();

      // 失敗
      if (!response.ok) {

        throw new Error(result.message || "upload failed");
      }

      console.log("推薦成功:", result);

      // 成功提示
      message.style.color = "green";

      message.textContent = "推薦成功！";

      // 清空表單
      form.reset();

      // 清空圖片預覽
      previewImage.src = "";

      previewImage.style.display = "none";

    } catch (error) {

      console.error(error);

      message.style.color = "red";

      message.textContent =
              "推薦失敗：" + error.message;
    }
  });
</script>
</body>
</html>
