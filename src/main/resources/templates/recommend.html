<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/navbar.css">

  <title>會員推薦餐廳</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f6fa;
      padding: 40px;
    }

    .container {
      max-width: 560px;
      margin: 100px auto 0;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
    }

    .upload-limit-box {
      margin: 18px 0;
      padding: 14px;
      background: #f7f7f7;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      color: #333;
    }

    .upload-limit-box.zero {
      background: #ffecec;
      color: #e74c3c;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      height: 120px;
    }

    button {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 16px;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
    }

    .message {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
  <h1>會員推薦餐廳</h1>

  <div id="uploadLimitBox" class="upload-limit-box">
    今日剩餘上傳次數：
    <span id="remainText">讀取中...</span>
  </div>

  <form id="recommendForm">

    <label>餐廳名稱</label>
    <input type="text" id="restaurantName" required>

    <label>餐廳地址</label>
    <input type="text" id="address" required>

    <label>上傳美食菜色照片</label>
    <input type="file" id="photo" accept="image/*" required>
    <img id="previewImage" class="preview">

    <label>星等評分</label>
    <select id="starRating" required>
      <option value="">請選擇星等</option>
      <option value="5">★★★★★ 5 星</option>
      <option value="4">★★★★ 4 星</option>
      <option value="3">★★★ 3 星</option>
      <option value="2">★★ 2 星</option>
      <option value="1">★ 1 星</option>
    </select>

    <label>推薦描述</label>
    <textarea id="description" required></textarea>

    <button id="submitBtn" type="submit">送出推薦</button>

    <div id="message" class="message"></div>
  </form>
</div>

<script>
  const photoInput = document.getElementById("photo");
  const previewImage = document.getElementById("previewImage");
  const form = document.getElementById("recommendForm");
  const message = document.getElementById("message");
  const remainText = document.getElementById("remainText");
  const uploadLimitBox = document.getElementById("uploadLimitBox");
  const submitBtn = document.getElementById("submitBtn");

  async function loadUploadLimit() {
    try {
      const response = await fetch("/api/recommended-restaurants/upload-limit");
      const data = await response.json();

      if (data.success) {
        remainText.textContent = data.remaining + " / " + data.dailyLimit;

        if (data.remaining <= 0) {
          uploadLimitBox.classList.add("zero");
          submitBtn.disabled = true;
          submitBtn.textContent = "今日上傳已達上限";
        } else {
          uploadLimitBox.classList.remove("zero");
          submitBtn.disabled = false;
          submitBtn.textContent = "送出推薦";
        }

      } else {
        remainText.textContent = data.message;
        uploadLimitBox.classList.add("zero");
        submitBtn.disabled = true;
        submitBtn.textContent = "請先登入";
      }

    } catch (error) {
      remainText.textContent = "讀取失敗";
      uploadLimitBox.classList.add("zero");
      submitBtn.disabled = true;
      submitBtn.textContent = "暫時無法上傳";
    }
  }

  photoInput.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
      previewImage.src = URL.createObjectURL(file);
      previewImage.style.display = "block";
    }
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const photoFile = photoInput.files[0];

    if (!photoFile) {
      message.style.color = "red";
      message.textContent = "請選擇圖片";
      return;
    }

    const formData = new FormData();

    formData.append("name", document.getElementById("restaurantName").value);
    formData.append("address", document.getElementById("address").value);
    formData.append("rating", document.getElementById("starRating").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("photo", photoFile);

    message.style.color = "#333";
    message.textContent = "上傳中，請稍候...";

    submitBtn.disabled = true;
    submitBtn.textContent = "上傳中...";

    try {
      const response = await fetch("/api/recommended-restaurants", {
        method: "POST",
        body: formData
      });

      const result = await response.json();

      if (!response.ok || !result.success) {
        throw new Error(result.message || "推薦失敗");
      }

      message.style.color = "green";
      message.textContent = result.message;

      remainText.textContent = result.remaining + " / " + result.dailyLimit;

      if (result.remaining <= 0) {
        uploadLimitBox.classList.add("zero");
        submitBtn.disabled = true;
        submitBtn.textContent = "今日上傳已達上限";
      } else {
        uploadLimitBox.classList.remove("zero");
        submitBtn.disabled = false;
        submitBtn.textContent = "送出推薦";
      }

      form.reset();
      previewImage.src = "";
      previewImage.style.display = "none";

    } catch (error) {
      message.style.color = "red";
      message.textContent = "推薦失敗：" + error.message;

      await loadUploadLimit();
    }
  });

  loadUploadLimit();
</script>

</body>
</html>
