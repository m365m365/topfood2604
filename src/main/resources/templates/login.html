<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 導覽列 -->
    <!-- ✅ 正確位置 -->
    <link rel="stylesheet" href="/navbar.css">
    <!-- JS -->
    <script src="/navbar.js" defer></script>
    <title>會員登入</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #fff7ed, #fee2e2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 360px;
            background: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #ef4444;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #dc2626;
        }

        .msg {
            text-align: center;
            margin-bottom: 12px;
            color: red;
        }

        .logout {
            color: green;
        }
    </style>
</head>

<body>
<div id="navbar-container"></div>
<div class="login-box">

    <h2>會員登入</h2>

    <div class="msg" th:if="${param.error}">
        帳號或密碼錯誤，或帳號已停用
    </div>

    <div class="msg logout" th:if="${param.logout}">
        已成功登出
    </div>

    <form method="post" action="/login">

        <label>帳號</label>
        <input type="text" name="username" placeholder="請輸入帳號">

        <label>密碼</label>
        <input type="password" name="password" placeholder="請輸入密碼">

        <button type="submit">登入</button>

    </form>

</div>

</body>
</html>
