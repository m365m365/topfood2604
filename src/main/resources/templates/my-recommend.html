<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/navbar.css">

  <title>我的推薦</title>

  <style>


    .container {
      width: 80%;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .date {
      color: gray;
      font-size: 14px;
      margin-top: 6px;
    }

    .btn {
      background: #4CAF50;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: #45a049;
    }

    .empty {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      color: #777;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
  <h1>我的推薦</h1>

  <div th:if="${#lists.isEmpty(recommendList)}" class="empty">
    目前還沒有推薦餐廳
  </div>

  <div class="card" th:each="item : ${recommendList}">
    <div>
      <div class="name" th:text="${item.restaurant.restaurantName}">
        餐廳名稱
      </div>

      <div class="date" th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">
        推薦日期
      </div>
    </div>

    <a th:href="@{/recommend-detail(id=${item.id})}" class="btn">
      查看
    </a>
  </div>
  </div>



</body>
</html>
