<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="navbar" th:fragment="navbar">

  <div class="nav-logo">
    <a th:href="@{/}">TopFood AI</a>
  </div>

  <div class="nav-links">

    <a th:href="@{/index.html}">首頁</a>

    <a th:href="@{/my-recommend}">我的推薦</a>

    <!-- 未登入 -->
    <a th:if="${!loggedIn}" th:href="@{/login}">
      登入
    </a>

    <!-- 已登入 -->
    <span th:if="${loggedIn}" class="welcome-user">
      Hi, <span th:text="${loginUsername}">user</span>
    </span>

    <!-- 管理者下拉選單 -->
    <div class="dropdown"
         th:if="${loggedIn and loginUsername == 'admin'}">

      <button class="dropdown-btn" type="button">
        管理者後台 ▼
      </button>

      <div class="dropdown-content">
        <a th:href="@{/admin}">
          推薦餐廳管理
        </a>

        <a th:href="@{/admin/upload-usage}">
          上傳次數管理
        </a>

        <a th:href="@{/admin/members}">
          會員等級管理
        </a>
      </div>

    </div>

    <!-- 登出 -->
    <form th:if="${loggedIn}"
          method="post"
          th:action="@{/logout}"
          class="logout-form">

      <button type="submit" class="logout-btn">
        登出
      </button>

    </form>

  </div>

</nav>

</body>
</html>
