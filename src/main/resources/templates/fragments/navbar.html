<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="navbar" th:fragment="navbar">

  <div class="nav-logo">
    <a th:href="@{/}">TopFood AI</a>
  </div>

  <div class="nav-links">

    <a th:href="@{/}">首頁</a>

    <a th:href="@{/my-recommend}">我的推薦</a>

    <!-- 未登入 -->
    <a th:if="${!loggedIn}" th:href="@{/login}">
      登入
    </a>

    <!-- 已登入 -->
    <span th:if="${loggedIn}" class="welcome-user">
            Hi, <span th:text="${loginUsername}">user</span>
        </span>

    <!-- 只有 admin 才能看到 -->
    <a th:if="${loggedIn and loginUsername == 'admin'}"
       th:href="@{/templates/adminok.html}">
      管理者
    </a>

    <!-- 登出 -->
    <form th:if="${loggedIn}"
          method="post"
          th:action="@{/logout}"
          class="logout-form">

      <button type="submit" class="logout-btn">
        登出
      </button>

    </form>

  </div>

</nav>

</body>
</html>
