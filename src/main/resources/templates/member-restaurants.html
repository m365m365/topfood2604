<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${memberName} + ' 的推薦餐廳'">會員推薦餐廳</title>

    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: 0.25s;
        }

        .card img:hover {
            transform: scale(1.03);
        }

        .content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .title a {
            color: #111;
            text-decoration: none;
        }

        .title a:hover {
            color: #ff6b35;
            text-decoration: underline;
        }

        .stars {
            color: #ff9800;
            margin-bottom: 8px;
        }

        .address,
        .desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .like {
            color: #ff4d4f;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .btn {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            background: #198754;
            color: white;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .btn-detail {
            background: #ff6b35;
        }

        .btn-report {
            background: #6c757d;
        }

        .btn-report:disabled {
            background: #999;
            cursor: not-allowed;
            opacity: 0.75;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b35;
            text-decoration: none;
            font-weight: 700;
        }

        .empty {
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 16px;
            color: #777;
        }

        .reported-box {
            min-height: 420px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f1f3f5;
            color: #555;
            text-align: center;
        }

        .reported-title {
            font-size: 24px;
            font-weight: 900;
            color: #dc3545;
            margin-bottom: 12px;
        }

        .reported-text {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .countdown {
            font-size: 20px;
            font-weight: 900;
            color: #ff6b35;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/index.html" class="back">← 回首頁</a>

    <h1>
        <span th:text="${memberName}">會員</span>
        的推薦餐廳
    </h1>

    <div th:if="${#lists.isEmpty(restaurants)}" class="empty">
        這位會員目前尚無推薦餐廳
    </div>

    <div class="grid" th:if="${!#lists.isEmpty(restaurants)}">

        <div class="card" th:each="r : ${restaurants}">

            <div th:if="${r.status == 'BLOCKED'}"
                 class="reported-box"
                 th:data-seconds="259200">
                <div class="reported-title">⚠️ 檢舉通知</div>
                <div class="reported-text">內容被會員檢舉，遮蔽 72 小時</div>
                <div class="countdown">
                    <span class="countdown-number">載入中...</span>
                </div>
            </div>

            <div th:if="${r.status != 'BLOCKED'}"
                 style="display:flex; flex-direction:column; height:100%;">

                <a th:href="@{'/restaurant/' + ${r.id}}">
                    <img th:src="${r.thumbUrl != null ? r.thumbUrl : r.imageUrl}"
                         alt="餐廳圖片">
                </a>

                <div class="content">

                    <div class="title">
                        <a th:href="@{'/restaurant/' + ${r.id}}"
                           th:text="${r.restaurantName}">
                            餐廳名稱
                        </a>
                    </div>

                    <div class="stars">★★★★★</div>

                    <div class="address" th:text="${r.address}">
                        地址
                    </div>

                    <div class="desc" th:text="${r.description}">
                        描述
                    </div>

                    <div class="like">
                        <span th:text="${r.likeCount}">0</span> 讚
                    </div>

                    <div class="btn-row">
                        <a class="btn btn-detail"
                           th:href="@{'/restaurant/' + ${r.id}}">
                            查看詳情
                        </a>

                        <button class="btn btn-report report-btn"
                                type="button"
                                th:data-id="${r.id}"
                                onclick="reportRestaurant(this)">
                            檢舉不當內容
                        </button>
                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script>
    function loadReportStatus() {
        fetch('/api/reports/status')
            .then(res => res.json())
            .then(data => {
                if (!data.canReport) {
                    document.querySelectorAll(".report-btn")
                        .forEach(btn => {
                            btn.disabled = true;
                            btn.innerText = "今日檢舉次數已滿";
                        });
                }
            })
            .catch(error => {
                console.error("讀取檢舉狀態失敗", error);
            });
    }

    function reportRestaurant(button) {
        const card = button.closest(".card");
        const restaurantId = button.dataset.id;

        if (!card || !restaurantId) {
            alert("找不到餐廳資料");
            return;
        }

        button.disabled = true;
        button.innerText = "檢舉處理中...";

        const originalHtml = card.innerHTML;

        fetch(`/api/reports/restaurants/${restaurantId}`, {
            method: "POST"
        })
            .then(response => response.json())
            .then(data => {
                showReportMask(
                    card,
                    originalHtml,
                    data.message,
                    data.countdownSeconds
                );

                loadReportStatus();
            })
            .catch(error => {
                console.error(error);
                alert("檢舉失敗，請稍後再試");

                button.disabled = false;
                button.innerText = "檢舉不當內容";
            });
    }

    function showReportMask(card, originalHtml, message, seconds) {
        let left = Number(seconds || 0);

        card.innerHTML = `
            <div class="reported-box" data-seconds="${left}">
                <div class="reported-title">⚠️ 檢舉通知</div>
                <div class="reported-text">${message}</div>
                <div class="countdown">
                    <span class="countdown-number">${formatCountdown(left)}</span>
                </div>
            </div>
        `;

        const timer = setInterval(() => {
            left--;

            const countdown = card.querySelector(".countdown-number");

            if (countdown) {
                countdown.textContent = formatCountdown(left);
            }

            if (left <= 0) {
                clearInterval(timer);
                card.innerHTML = originalHtml;
                loadReportStatus();
            }

        }, 1000);
    }

    function startExistingBlockedCountdowns() {
        document.querySelectorAll(".reported-box").forEach(box => {
            let seconds = Number(box.dataset.seconds || 259200);
            const countdown = box.querySelector(".countdown-number");

            if (!countdown) {
                return;
            }

            function update() {
                countdown.textContent = formatCountdown(seconds);

                if (seconds <= 0) {
                    location.reload();
                    return;
                }

                seconds--;
            }

            update();
            setInterval(update, 1000);
        });
    }

    function formatCountdown(seconds) {
        seconds = Number(seconds || 0);

        if (seconds >= 3600) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            return `${hours} 小時 ${minutes} 分 ${secs} 秒後恢復`;
        }

        return `${seconds} 秒後恢復`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        startExistingBlockedCountdowns();
        loadReportStatus();
    });
</script>

</body>
</html>
