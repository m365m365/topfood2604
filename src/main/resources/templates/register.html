<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/navbar.css">

  <title>會員註冊</title>


  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
    }

    .container {
      width: 420px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      background: #ff7a00;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 8px;
      font-size: 14px;
    }

    .login-link {
      text-align: center;
      margin-top: 18px;
    }
    .warning-text1 {
      color: #dc3545;


    }
  </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
  <h1>會員註冊</h1>
  <p>
    TopFood AI 目前是一個實驗作品平台，
    網站防護性可能尚未完善。

    <span class="warning-text1">
                                  會員註冊時，密碼請勿使用重要或常用密碼，
                            </span>
    以避免資料外洩造成損失。
  </p>

  <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

  <form th:action="@{/register}" th:object="${registerRequestDto}" method="post">

    <label>Email 帳號</label>
    <input type="email" th:field="*{email}" placeholder="請輸入 Email">
    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

    <label>姓名</label>
    <input type="text" th:field="*{name}" placeholder="請輸入姓名">

    <label>密碼</label>
    <input type="password" th:field="*{password}" placeholder="至少 6 碼">
    <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

    <label>確認密碼</label>
    <input type="password" th:field="*{confirmPassword}" placeholder="再次輸入密碼">
    <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>

    <button type="submit">註冊</button>
  </form>

  <div class="login-link">
    已有帳號？<a th:href="@{/login}">前往登入</a>
  </div>
</div>

</body>
</html>
