<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <div th:replace="fragments/sub-navbar :: subNavbar"></div>
    <title>商業活動</title>
    <link rel="stylesheet" th:href="@{/navbar.css}">
</head>

<body>

<div th:replace="~{fragments/main-navbar :: mainNavbar}"></div>
<div th:replace="fragments/sub-navbar :: subNavbar"></div>

<style>
    .sub-navbar {
        height: 46px;
        background: #eef5f8;

        display: flex;
        justify-content: center;
        align-items: center;
        gap: 36px;

        border-bottom: 1px solid #d9e4ea;

        position: sticky;
        top: 64px;

        z-index: 900;
    }

    .sub-navbar a {
        color: #24384a;
        font-weight: 700;
        text-decoration: none;
    }

    .sub-navbar a:hover {
        color: #0d6efd;
    }
</style>
<div class="page-container">

    <h1 class="page-title">商業活動</h1>

    <div class="card-box">
        <h2>美食商業活動</h2>
        <p>這裡未來可以放餐廳優惠、展覽、合作活動。</p>

        <ul>
            <li>餐廳優惠活動</li>
            <li>美食展覽資訊</li>
            <li>合作商家活動</li>
            <li>品牌聯名推薦</li>
        </ul>
    </div>

</div>

</body>
</html>
