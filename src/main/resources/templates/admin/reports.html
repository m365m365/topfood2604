<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>檢舉管理後台</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f7f7f7;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #26394d;
      color: white;
    }

    .status {
      font-weight: bold;
      color: #ff6b35;
    }

    .status-passed {
      color: #198754;
      font-weight: bold;
    }

    .status-released {
      color: #0d6efd;
      font-weight: bold;
    }

    .status-banned {
      color: #dc3545;
      font-weight: bold;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      color: white;
      cursor: pointer;
      font-size: 13px;
      margin: 2px;
    }

    .btn-pass {
      background: #198754;
    }

    .btn-release {
      background: #0d6efd;
    }

    .btn-ban {
      background: #dc3545;
    }

    .btn:disabled {
      background: #999;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .empty {
      background: white;
      padding: 30px;
      border-radius: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<h1>檢舉管理後台</h1>

<div th:if="${#lists.isEmpty(reports)}" class="empty">
  目前沒有檢舉紀錄
</div>

<table th:if="${!#lists.isEmpty(reports)}">
  <thead>
  <tr>
    <th>ID</th>
    <th>檢舉會員</th>
    <th>被檢舉會員</th>
    <th>檢舉餐廳</th>
    <th>檢舉時間</th>
    <th>遮蔽到期</th>
    <th>倒數秒數</th>
    <th>審查通過</th>
    <th>狀態</th>
    <th>操作</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="r : ${reports}">
    <td th:text="${r.id}">1</td>
    <td th:text="${r.reporterMemberId}">1</td>
    <td th:text="${r.reportedMemberId}">2</td>
    <td>
      <span th:text="${r.restaurantName}">餐廳名稱</span>
      <br>
      <small style="color:#777;">
        ID: <span th:text="${r.restaurantId}">10</span>
      </small>
    </td>
    <td th:text="${r.reportTime}">time</td>
    <td th:text="${r.blockedUntil}">time</td>
    <td th:text="${r.countdownSeconds}">0</td>
    <td th:text="${r.reviewPassed ? '是' : '否'}">否</td>

    <td>
      <span th:if="${r.status == 'ACTIVE'}"
            class="status">
        ACTIVE
      </span>

      <span th:if="${r.status == 'PASSED'}"
            class="status-passed">
        PASSED
      </span>

      <span th:if="${r.status == 'RELEASED'}"
            class="status-released">
        RELEASED
      </span>

      <span th:if="${r.status == 'MEMBER_BANNED'}"
            class="status-banned">
        MEMBER_BANNED
      </span>

      <span th:if="${r.status != 'ACTIVE'
                and r.status != 'PASSED'
                and r.status != 'RELEASED'
                and r.status != 'MEMBER_BANNED'}"
            class="status"
            th:text="${r.status}">
        STATUS
      </span>
    </td>

    <td>
      <form th:action="@{'/admin/reports/' + ${r.id} + '/pass'}"
            method="post"
            style="display:inline;">
        <button class="btn btn-pass"
                type="submit"
                th:disabled="${r.status != 'ACTIVE' and r.status != 'BLOCKED'}">
          通過
        </button>
      </form>

      <form th:action="@{'/admin/reports/' + ${r.id} + '/release'}"
            method="post"
            style="display:inline;">
        <button class="btn btn-release"
                type="submit"
                th:disabled="${r.status != 'ACTIVE' and r.status != 'BLOCKED'}">
          解除遮蔽
        </button>
      </form>

      <form th:action="@{'/admin/reports/' + ${r.id} + '/ban-member'}"
            method="post"
            style="display:inline;"
            onsubmit="return confirm('確定要封鎖這位會員嗎？');">
        <button class="btn btn-ban"
                type="submit"
                th:disabled="${r.status == 'MEMBER_BANNED'}">
          封鎖會員
        </button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

</body>
</html>
