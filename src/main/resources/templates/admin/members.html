<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員管理</title>

    <link rel="stylesheet" href="/navbar.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #222;
            color: white;
        }

        select {
            padding: 6px 10px;
        }

        button {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .state-active {
            color: #198754;
            font-weight: bold;
        }

        .state-disabled {
            color: #dc3545;
            font-weight: bold;
        }

        .btn-ban {
            background: #dc3545;
        }

        .btn-ban:hover {
            background: #b02a37;
        }

        .btn-unban {
            background: #198754;
        }

        .btn-unban:hover {
            background: #146c43;
        }

        .btn-disabled {
            background: #999;
            cursor: not-allowed;
        }

        .action-form {
            display: inline-block;
            margin: 2px;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1>會員管理</h1>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>帳號</th>
            <th>姓名</th>
            <th>Email</th>
            <th>角色</th>
            <th>會員狀態</th>
            <th>目前等級</th>
            <th>修改等級</th>
            <th>帳號操作</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.id}">1</td>
            <td th:text="${member.username}">user</td>
            <td th:text="${member.name}">name</td>
            <td th:text="${member.email}">email</td>
            <td th:text="${member.role}">USER</td>

            <td>
                <span th:if="${member.state == 'ACTIVE'}"
                      class="state-active">
                    ACTIVE
                </span>

                <span th:if="${member.state == 'DISABLED'}"
                      class="state-disabled">
                    DISABLED
                </span>

                <span th:if="${member.state != 'ACTIVE' and member.state != 'DISABLED'}"
                      th:text="${member.state}">
                    UNKNOWN
                </span>
            </td>

            <td th:text="${member.tier != null ? member.tier.name : '尚未設定'}">
                普通會員
            </td>

            <td>
                <form th:action="@{'/admin/members/' + ${member.id} + '/tier'}"
                      method="post">

                    <select name="tierId">
                        <option th:each="tier : ${tiers}"
                                th:value="${tier.id}"
                                th:text="${tier.name}"
                                th:selected="${member.tier != null and member.tier.id == tier.id}">
                        </option>
                    </select>

                    <button type="submit">更新</button>
                </form>
            </td>

            <td>
                <form class="action-form"
                      th:action="@{'/admin/members/' + ${member.id} + '/ban'}"
                      method="post"
                      onsubmit="return confirm('確定要封鎖這位會員嗎？');">

                    <button type="submit"
                            class="btn-ban"
                            th:disabled="${member.state == 'DISABLED'}"
                            th:classappend="${member.state == 'DISABLED'} ? ' btn-disabled'">
                        封鎖
                    </button>
                </form>

                <form class="action-form"
                      th:action="@{'/admin/members/' + ${member.id} + '/unban'}"
                      method="post">

                    <button type="submit"
                            class="btn-unban"
                            th:disabled="${member.state == 'ACTIVE'}"
                            th:classappend="${member.state == 'ACTIVE'} ? ' btn-disabled'">
                        解除封鎖
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
