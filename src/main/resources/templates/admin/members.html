<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員管理</title>

    <link rel="stylesheet" href="/navbar.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #222;
            color: white;
        }

        select {
            padding: 6px 10px;
        }

        button {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1>會員管理</h1>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>帳號</th>
            <th>姓名</th>
            <th>Email</th>
            <th>角色</th>
            <th>目前等級</th>
            <th>修改等級</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.id}">1</td>
            <td th:text="${member.username}">user</td>
            <td th:text="${member.name}">name</td>
            <td th:text="${member.email}">email</td>
            <td th:text="${member.role}">USER</td>

            <td th:text="${member.tier != null ? member.tier.name : '尚未設定'}">
                普通會員
            </td>

            <td>
                <form th:action="@{'/admin/members/' + ${member.id} + '/tier'}"
                      method="post">

                    <select name="tierId">
                        <option th:each="tier : ${tiers}"
                                th:value="${tier.id}"
                                th:text="${tier.name}"
                                th:selected="${member.tier != null and member.tier.id == tier.id}">
                        </option>
                    </select>

                    <button type="submit">更新</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
