<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${restaurant['restaurant_name']}">餐廳詳細頁</title>

    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: #f6f6f6;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
        }

        .cover {
            width: 100%;
            height: 430px;
            object-fit: cover;
            background: #eee;
        }

        .content {
            padding: 32px;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #ff6b35;
            font-weight: 700;
            text-decoration: none;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
        }

        .stars {
            color: #ff9800;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .info {
            color: #555;
            line-height: 1.8;
            margin-bottom: 18px;
        }

        .desc {
            font-size: 16px;
            line-height: 1.9;
            color: #444;
            margin: 22px 0;
        }

        .like {
            color: #ff4d4f;
            font-size: 20px;
            font-weight: 800;
            margin: 20px 0;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            color: white;
        }

        .btn-map {
            background: #198754;
        }

        .btn-member {
            background: #ff6b35;
        }

        .section-title {
            font-weight: 800;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .cover {
                height: 260px;
            }

            .content {
                padding: 22px;
            }

            h1 {
                font-size: 24px;
            }
        }
        .like-wrapper {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 24px;
        }

        .like-tip {
            color: #ff5722;
            font-size: 18px;
            font-weight: bold;

            animation: blinkLikeTip 1.2s infinite;
        }

        @keyframes blinkLikeTip {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
        #fireworksBox {
            position: fixed;
            left: 50%;
            top: 45%;
            pointer-events: none;
            z-index: 9999;
        }

        .firework {
            position: absolute;
            font-size: 28px;
            animation: fireworkBoom 0.9s ease-out forwards;
        }

        @keyframes fireworkBoom {
            0% {
                transform: scale(0.2);
                opacity: 1;
            }
            100% {
                transform: scale(2.5) translateY(-40px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div style="max-width:950px; margin:0 auto 16px;">
    <a href="/index.html" class="back">← 回首頁</a>
</div>
<div id="fireworksBox"></div>
<div class="container">

    <img class="cover"
         th:src="${restaurant['image_url'] != null ? restaurant['image_url'] : restaurant['thumb_url']}"
         alt="餐廳圖片">

    <div class="content">

        <h1 th:text="${restaurant['restaurant_name']}">
            餐廳名稱
        </h1>

        <div class="stars">★★★★★</div>

        <div class="info">
            <strong>地址：</strong>
            <span th:text="${restaurant['address']}">地址</span>
        </div>

        <div class="section-title">餐廳介紹</div>

        <div class="desc" th:text="${restaurant['description']}">
            餐廳描述
        </div>

        <div class="like-wrapper">

            <div class="like-tip">
                ✨ 右邊愛心鈕加入會員可按讚！
            </div>

            <div class="like">

                <button id="likeButton"
                        th:data-id="${restaurant['id']}"
                        style="border:none; background:none; cursor:pointer; font-size:22px;">
                    ❤️
                </button>

                <span id="likeCount"
                      th:text="${restaurant['like_count']}">0</span> 讚

            </div>

        </div>


        <div class="info">
            <strong>推薦會員：</strong>
            <a th:if="${restaurant['member_id'] != null}"
               th:href="@{'/member/' + ${restaurant['member_id']} + '/restaurants'}"
               th:text="${restaurant['member_name']}"
               style="color:#ff6b35; font-weight:800; text-decoration:none;">
                會員
            </a>

            <span th:if="${restaurant['member_id'] == null}">
                尚無推薦會員資料
            </span>
        </div>

        <div class="btn-row">
            <button class="map-btn" onclick="openCorrectMap(restaurantId)">
                查看 Google 地圖
            </button>

            <a class="btn btn-member"
               th:if="${restaurant['member_id'] != null}"
               th:href="@{'/member/' + ${restaurant['member_id']} + '/restaurants'}">
                查看推薦者其他餐廳
            </a>
        </div>

    </div>
</div>
<script>
    const likeButton = document.getElementById("likeButton");
    const likeCount = document.getElementById("likeCount");

    likeButton.addEventListener("click", async function () {
        const restaurantId = this.dataset.id;

        try {
            likeButton.disabled = true;

            const response = await fetch(`/api/restaurant/${restaurantId}/like`, {
                method: "POST"
            });

            if (!response.ok) {
                throw new Error("HTTP status = " + response.status);
            }

            const data = await response.json();

            if (data.success) {

                likeCount.textContent = data.likeCount;

                for (let i = 0; i < 5; i++) {

                    setTimeout(() => {
                        showFireworks();
                    }, i * 500);

                }
            } else {
                alert(data.message || "按讚失敗");
            }

        } catch (error) {
            console.error("按讚失敗:", error);
            alert("按讚失敗，請稍後再試");
        } finally {
            likeButton.disabled = false;
        }
    });
    const restaurantId = window.location.pathname.split("/").pop();

    function openCorrectMap(id) {
        fetch(`/api/recommended-restaurants/${id}/map`)
            .then(response => response.json())
            .then(data => {
                if (data.mapUrl) {
                    window.open(data.mapUrl, "_blank");
                } else {
                    alert("找不到正確地圖");
                }
            })
            .catch(error => {
                console.error(error);
                alert("地圖查詢失敗");
            });
    }
    function showFireworks() {
        const box = document.getElementById("fireworksBox");

        for (let i = 0; i < 12; i++) {
            const fw = document.createElement("div");
            fw.className = "firework";
            fw.textContent = ["🎆", "✨", "🎇", "💥"][Math.floor(Math.random() * 4)];

            fw.style.left = (Math.random() * 220 - 110) + "px";
            fw.style.top = (Math.random() * 120 - 60) + "px";

            box.appendChild(fw);

            setTimeout(() => {
                fw.remove();
            }, 900);
        }
    }

</script>
</body>
</html>
